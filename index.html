<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анастасия Молокова - Налоговый консультант</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel для JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100;300;400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans', sans-serif;
            background-color: #FAF9F6;
            margin: 0;
            padding: 0;
        }

        .wine-gradient { background: linear-gradient(135deg, #4C0519 0%, #881337 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .custom-cursor { 
            pointer-events: none; 
            position: fixed; 
            z-index: 9999; 
            border-radius: 50%; 
            border: 1px solid #4C0519; 
            transition: transform 0.1s ease-out, width 0.3s, height 0.3s; 
            display: none;
        }

        @media (min-width: 1024px) {
            .custom-cursor { display: flex; }
            .cursor-none { cursor: none; }
        }

        .tabular-nums { font-variant-numeric: tabular-nums; }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #4C0519;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="md:cursor-none overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Оптимизированные инлайн-SVG иконки с использованием фрагментов для избежания ошибок Babel
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                mail: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM22 6l-10 7L2 6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                database: <path d="M3 6s0 3 9 3 9-3 9-3M3 12s0 3 9 3 9-3 9-3M3 18s0 3 9 3 9-3 9-3M3 6v12M21 6v12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                trending: <path d="M23 6l-9.5 9.5-5-5L1 18M17 6h6v6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                shieldCheck: (
                    <React.Fragment>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        <path d="M9 12l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </React.Fragment>
                ),
                layers: <path d="M12 2l9 4.5-9 4.5-9-4.5L12 2zm0 6l9 4.5-9 4.5-9-4.5L12 8zm0 6l9 4.5-9 4.5-9-4.5L12 14z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                info: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="2"/>
                        <path d="M12 16v-4M12 8h.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                    </React.Fragment>
                ),
                alert: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="2"/>
                        <path d="M12 8v4M12 16h.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                    </React.Fragment>
                ),
                play: <path d="M5 3l14 9-14 9V3z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                arrow: <path d="M5 12h14M12 5l7 7-7 7" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                users: (
                    <React.Fragment>
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        <circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" strokeWidth="2"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </React.Fragment>
                ),
                building: <path d="M3 21h18M9 8h1M9 12h1M9 16h1M14 8h1M14 12h1M14 16h1M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            };
            return (
                <svg viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const Counter = ({ value, duration = 2000 }) => {
            const [count, setCount] = useState(0);
            const nodeRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            const targetString = value.toString();
            const target = parseFloat(targetString.replace(/[^\d.]/g, '')) || 0;
            const suffix = targetString.replace(/[\d.]/g, '');

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setIsVisible(true); }, { threshold: 0.1 });
                if (nodeRef.current) observer.observe(nodeRef.current);
                return () => observer.disconnect();
            }, []);

            useEffect(() => {
                if (!isVisible) return;
                let start = 0;
                const increment = target / (duration / 16);
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= target) { setCount(target); clearInterval(timer); } else { setCount(start); }
                }, 16);
                return () => clearInterval(timer);
            }, [isVisible, target, duration]);

            return <span ref={nodeRef} className="tabular-nums">{count % 1 === 0 ? count : count.toFixed(1)}{suffix}</span>;
        };

        const Reveal = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setIsVisible(true); }, { threshold: 0.05 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div ref={ref} className={`transition-all duration-1000 ease-out transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-8 opacity-0'}`} style={{ transitionDelay: `${delay}ms` }}>
                    {children}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('vat');
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [isHovering, setIsHovering] = useState(false);
            const [isTouchDevice, setIsTouchDevice] = useState(false);
            const [isLoaded, setIsLoaded] = useState(false);
            const [videoStarted, setVideoStarted] = useState(false);

            const [calcData, setCalcData] = useState({ income: "30 000 000", expenses: "15 000 000", share22: 40, share57: 30, isUSN15: false });
            const [vatResults, setVatResults] = useState(null);
            const [compareData, setCompareData] = useState({ income: "25 000 000", expensesNoFot: "8 000 000", fot: "3 000 000", employees: "3", insRate: 15, nsRate: "0.2", entity: "ИП" });
            const [compareResults, setCompareResults] = useState(null);

            useEffect(() => {
                setIsLoaded(true);
                const checkTouch = () => { setIsTouchDevice('ontouchstart' in window || navigator.maxTouchPoints > 0); };
                checkTouch();
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                    const hoveredEl = document.elementFromPoint(e.clientX, e.clientY);
                    const isInteractive = hoveredEl?.closest('button, a, input, [role="button"], label, iframe');
                    setIsHovering(!!isInteractive);
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            const formatValue = (val) => {
                if (!val) return "";
                const clean = val.toString().replace(/[^\d.,]/g, "").replace(",", ".");
                if (clean.includes(".")) {
                    const parts = clean.split(".");
                    return parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ") + "." + parts[1].slice(0, 2);
                }
                return clean.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
            };

            const parseValue = (val) => Number(val.toString().replace(/\s/g, "").replace(",", "."));

            const handleInputChange = (field, value, type = 'vat') => {
                const formatted = formatValue(value);
                if (type === 'vat') setCalcData({ ...calcData, [field]: formatted });
                else setCompareData({ ...compareData, [field]: formatted });
            };

            const calculateVAT = () => {
                const inc = parseValue(calcData.income);
                const exp = parseValue(calcData.expenses);
                const s22 = calcData.share22 / 100;
                const s57 = calcData.share57 / 100;
                let v57_out = inc > 20000000 ? ((inc - 20000000) / 105 * 5) : 0;
                if (inc > 250000000) v57_out += ((inc - 250000000) / 107 * 7);
                let v22_out = inc > 20000000 ? ((inc - 20000000) / 122 * 22) : 0;
                const v22_in = ((exp * s22) / 122 * 22) + ((exp * s57) / 105 * 5);
                const v22_payable = Math.max(0, v22_out - v22_in);
                const incBase57 = inc - v57_out;
                const incBase22 = inc - v22_out;
                let usn57, usn22;
                if (calcData.isUSN15) {
                    usn57 = Math.max((incBase57 - exp) * 0.15, incBase57 * 0.01);
                    usn22 = Math.max((incBase22 - exp) * 0.15, incBase22 * 0.01);
                } else {
                    usn57 = incBase57 * 0.06;
                    usn22 = incBase22 * 0.06;
                }
                setVatResults({
                    col57: { vat: v57_out, usn: usn57, total: v57_out + usn57, isMin: calcData.isUSN15 && Math.round(usn57) === Math.round(incBase57 * 0.01) },
                    col22: { vat: v22_payable, usn: usn22, total: v22_payable + usn22, isMin: calcData.isUSN15 && Math.round(usn22) === Math.round(incBase22 * 0.01) }
                });
            };

            const calculateComparison = () => {
                const inc = parseValue(compareData.income);
                const expNoFot = parseValue(compareData.expensesNoFot);
                const fotInput = parseValue(compareData.fot);
                const employees = parseValue(compareData.employees) || 1;
                const nsRate = parseValue(compareData.nsRate) / 100;
                const mrot = 27093;
                const thresholdPerMonth = mrot * 1.5;
                const totalThresholdAnnual = thresholdPerMonth * 12 * employees;
                const vat5 = inc > 20000000 ? (inc - 20000000) / 105 * 5 : 0;
                const cleanInc = inc - vat5;
                const ipExtra = (compareData.entity === "ИП") ? Math.max(0, (cleanInc - 300000) * 0.01) : 0;
                let grossSalary = 0, mainInsUSN = 0;
                if (compareData.insRate === 30) {
                    grossSalary = fotInput / (1.30 + nsRate);
                    mainInsUSN = grossSalary * 0.30;
                } else {
                    const T = totalThresholdAnnual;
                    if (fotInput <= T * (1.3 + nsRate)) {
                        grossSalary = fotInput / (1.3 + nsRate);
                        mainInsUSN = grossSalary * 0.30;
                    } else {
                        grossSalary = (fotInput - 0.15 * T) / (1.15 + nsRate);
                        mainInsUSN = (T * 0.30) + ((grossSalary - T) * 0.15);
                    }
                }
                const nsInsUSN = grossSalary * nsRate;
                const usnTotalInsLoad = mainInsUSN + nsInsUSN + ipExtra;
                const grossAUSN = fotInput / (1 + nsRate);
                const nsInsAUSN = grossAUSN * nsRate;
                const ausnEffectiveFotExpense = grossAUSN + nsInsAUSN;
                const usn6_tax = cleanInc * 0.06;
                const usn15_base = cleanInc - expNoFot - fotInput;
                const usn15_calc = usn15_base * 0.15;
                const usn15_min = cleanInc * 0.01;
                const usn15_tax = Math.max(usn15_calc, usn15_min);
                const ausn8_tax = inc * 0.08;
                const ausn20_base = inc - expNoFot - ausnEffectiveFotExpense;
                const ausn20_calc = ausn20_base * 0.20;
                const ausn20_min = inc * 0.03;
                const ausn20_tax = Math.max(ausn20_calc, ausn20_min);
                setCompareResults({
                    usn6: { tax: usn6_tax, mainIns: mainInsUSN, nsIns: nsInsUSN, ipIns: ipExtra, vat: vat5, total: usn6_tax + usnTotalInsLoad + vat5 },
                    usn15: { tax: usn15_tax, mainIns: mainInsUSN, nsIns: nsInsUSN, ipIns: ipExtra, vat: vat5, total: usn15_tax + usnTotalInsLoad + vat5, isMin: Math.round(usn15_tax) === Math.round(usn15_min) },
                    ausn8: { tax: ausn8_tax, mainIns: 0, nsIns: nsInsAUSN, ipIns: 0, vat: 0, total: ausn8_tax + nsInsAUSN },
                    ausn20: { tax: ausn20_tax, mainIns: 0, nsIns: nsInsAUSN, ipIns: 0, vat: 0, total: ausn20_tax + nsInsAUSN, isMin: Math.round(ausn20_tax) === Math.round(ausn20_min) },
                    isBlocked: inc > 60000000 || employees > 5,
                    reason: inc > 60000000 ? "лимит 60м превышен" : "штат более 5 чел."
                });
            };

            const getMaxTotal = () => { if (!compareResults) return 1; return Math.max(compareResults.usn6.total, compareResults.usn15.total, compareResults.ausn8.total, compareResults.ausn20.total); };

            const achievements = [
                { id: 1, value: "12 лет", label: "в бухгалтерском и налоговом учете", icon: "database" },
                { id: 2, value: "1.5x", label: "снижение налогов группы компании через реструктуризацию", icon: "trending" },
                { id: 3, value: "0", label: "налоговых рисков после внедрения стратегии", icon: "shieldCheck" },
                { id: 4, value: "100%", label: "прозрачность и точность финансовых моделей", icon: "layers" },
            ];

            const pillars = [
                { title: "Из хаоса - в систему", desc: "перевожу хаотичный учет в прозрачные финансовые модели, где каждый рубль группы компаний виден и юридически обоснован.", icon: "database" },
                { title: "Финансовое моделирование", desc: "создание динамических моделей прибыли и движения денежных средств. единый рычаг управления вместо разрозненных таблиц.", icon: "layers" },
                { title: "Структурирование бизнеса", desc: "снижение налоговой нагрузки за счет разумного структурирования. выявление и устранение налоговых рисков.", icon: "shield" }
            ];

            return (
                <div className="min-h-screen">
                    {!isTouchDevice && (
                        <div className="custom-cursor items-center justify-center" style={{ left: mousePos.x, top: mousePos.y, width: isHovering ? '60px' : '30px', height: isHovering ? '60px' : '30px', transform: `translate(-50%, -50%)` }}><div className="w-1 h-1 bg-[#4C0519] rounded-full"></div></div>
                    )}

                    <nav className="fixed top-0 w-full z-40 px-4 py-4 md:py-6 md:px-12 flex flex-col md:flex-row justify-between items-center bg-white/80 backdrop-blur-xl border-b border-stone-200 gap-3 md:gap-0">
                        <div className="flex items-center gap-4 self-center md:self-auto">
                            <div className="text-[#4C0519] font-black text-xl md:text-2xl tracking-tighter italic underline decoration-stone-200">AM</div>
                            <div className="h-4 w-[1px] bg-stone-300"></div>
                            <span className="text-[9px] md:text-[10px] uppercase tracking-[0.3em] font-bold text-stone-400 uppercase">financial architecture</span>
                        </div>
                        <div className="flex gap-4 md:gap-10 text-[9px] md:text-[10px] uppercase tracking-widest font-bold text-stone-500 overflow-x-auto no-scrollbar max-w-full px-2 md:px-0">
                            <a href="#hero" className="hover:text-[#4C0519] transition-colors whitespace-nowrap">главная</a>
                            <a href="#pillars" className="hover:text-[#4C0519] transition-colors whitespace-nowrap">экспертиза</a>
                            <a href="#calc" className="hover:text-[#4C0519] transition-colors whitespace-nowrap italic">калькуляторы</a>
                            <a href="#contact" className="hover:text-[#4C0519] transition-colors whitespace-nowrap">контакт</a>
                        </div>
                    </nav>

                    <section id="hero" className="relative min-h-[95vh] md:min-h-screen flex items-center px-4 md:px-12 lg:px-24 pt-24 pb-16 overflow-hidden bg-[#FAF9F6]">
                        <div className="container mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center relative z-10">
                            <Reveal>
                                <div className="flex items-center gap-3 mb-6 md:mb-10">
                                    <div className="w-8 md:w-12 h-[1px] bg-[#4C0519]"></div>
                                    <span className="text-[10px] uppercase tracking-[0.4em] font-black text-[#4C0519]">экспертный статус</span>
                                </div>
                                <h1 className="text-4xl sm:text-6xl md:text-7xl xl:text-9xl font-thin text-stone-900 leading-[1] mb-8 md:mb-12 tracking-tighter">
                                    Анастасия<br/><span className="font-black italic text-[#4C0519]">Молокова</span>
                                </h1>
                                <p className="text-lg md:text-2xl text-stone-500 mb-8 md:mb-12 max-w-lg leading-relaxed font-light border-l-2 border-stone-200 pl-6 md:pl-8">
                                    налоговый консультант из мира бухгалтерии, действующий член палаты налоговых консультантов.
                                </p>
                            </Reveal>
                            <div className={`relative transition-all duration-1000 transform ${isLoaded ? 'scale-100 opacity-100' : 'scale-95 opacity-0'}`}>
                                <div className="relative group max-w-[320px] sm:max-w-[450px] lg:max-w-none mx-auto" style={{ transform: !isTouchDevice ? `translate(${mousePos.x / 120}px, ${mousePos.y / 120}px)` : 'none' }}>
                                    <div className="absolute -inset-2 md:-inset-4 border border-[#4C0519]/10 rounded-[2rem] md:rounded-[3rem] pointer-events-none"></div>
                                    <div className="relative z-10 aspect-[4/5] overflow-hidden rounded-[2rem] md:rounded-[3rem] shadow-[0_40px_100px_-30px_rgba(76,5,25,0.15)] bg-stone-100">
                                        <img src="https://i.yapx.ru/dQWUj.jpg" alt="Молокова Анастасия" className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-[1.5s] ease-in-out" />
                                    </div>
                                    <div className="absolute -bottom-6 -left-4 md:-bottom-10 md:-left-10 glass-card p-6 md:p-10 rounded-2xl md:rounded-3xl shadow-2xl z-20">
                                        <div className="text-2xl md:text-4xl font-black text-[#4C0519] mb-1 tracking-tighter text-nowrap">12 лет</div>
                                        <div className="text-[8px] md:text-[10px] uppercase tracking-widest text-stone-400 font-bold">безупречной практики</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="pillars" className="py-20 md:py-32 px-4 md:px-12 lg:px-24 bg-white border-y border-stone-100">
                        <div className="container mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-20">
                            {pillars.map((p, i) => (
                                <Reveal key={i} delay={i * 200}>
                                    <div className="group">
                                        <div className="text-[#4C0519] font-black text-xs uppercase tracking-widest mb-6 md:mb-8 flex items-center gap-4">
                                            <span className="w-8 h-8 rounded-full border border-[#4C0519]/20 flex items-center justify-center font-mono text-[10px]">{i + 1}</span>
                                            {p.title}
                                        </div>
                                        <p className="text-stone-500 leading-relaxed font-light text-base md:text-lg">{p.desc}</p>
                                    </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    <section id="stats" className="py-20 md:py-48 px-4 md:px-12 lg:px-24 bg-[#FAF9F6] overflow-hidden">
                        <div className="container mx-auto">
                            <Reveal>
                                <div className="mb-16 md:mb-24 text-center max-w-2xl mx-auto px-4">
                                    <h2 className="text-2xl md:text-6xl font-black text-stone-900 mb-6 tracking-tighter uppercase leading-none italic">Достижения и результаты</h2>
                                    <p className="text-stone-400 uppercase tracking-widest text-[9px] md:text-[10px] font-bold leading-loose">реальный вклад в финансовую устойчивость проектов</p>
                                </div>
                            </Reveal>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                                {achievements.map((item, idx) => (
                                    <Reveal key={item.id} delay={idx * 100}>
                                        <div className="p-8 md:p-10 glass-card rounded-[2rem] md:rounded-[2.5rem] shadow-xl h-full flex flex-col group hover:-translate-y-1 md:hover:-translate-y-2 transition-all duration-500">
                                            <div className="mb-6 p-4 bg-[#4C0519]/5 text-[#4C0519] w-fit rounded-2xl group-hover:bg-[#4C0519] group-hover:text-white transition-colors">
                                                <Icon name={item.icon} className="w-6 h-6 md:w-8 md:h-8" />
                                            </div>
                                            <div className="text-4xl md:text-5xl font-black text-[#4C0519] mb-4 md:mb-6 tracking-tighter drop-shadow-sm min-h-[50px] md:min-h-[60px] flex items-center">
                                                <Counter value={item.value} />
                                            </div>
                                            <div className="flex-grow flex items-start">
                                                <div className="text-[10px] md:text-[11px] uppercase tracking-[0.15em] text-zinc-500 font-bold leading-relaxed">{item.label}</div>
                                            </div>
                                        </div>
                                    </Reveal>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="calc" className="py-20 md:py-48 px-4 md:px-12 lg:px-24 bg-white relative">
                        <div className="container mx-auto">
                            <Reveal>
                                <div className="mb-12 md:mb-16">
